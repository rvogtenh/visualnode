<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<title>Visual Node MVP</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; cursor: none; min-height: 100dvh; }
  canvas { display: block; width: 100vw; height: 100dvh; }

  #ui {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 16px;
    background: rgba(0,0,0,0.55);
    color: #aaa; font-family: monospace; font-size: 12px;
    z-index: 10; transition: opacity 0.4s;
  }
  #ui.hidden { opacity: 0; pointer-events: none; }

  #start-screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #000; color: #fff;
    font-family: monospace; z-index: 20; gap: 20px;
  }
  #start-screen h1 { font-size: 1.4em; font-weight: normal; letter-spacing: 0.2em; color: #777; }
  #start-btn {
    padding: 12px 32px; border: 1px solid #555;
    background: transparent; color: #fff;
    font-family: monospace; font-size: 14px; letter-spacing: 0.1em;
    cursor: pointer; transition: border-color 0.2s;
  }
  #start-btn:hover { border-color: #fff; }
  #status { font-size: 11px; color: #555; }

  #shader-select {
    background: transparent; border: 1px solid #444;
    color: #aaa; font-family: monospace; font-size: 12px;
    padding: 2px 6px; cursor: pointer;
  }
  #shader-select option { background: #111; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="pause-overlay" style="display:none; position:fixed; inset:0; background:#000; z-index:5;"></div>

<div id="start-screen">
  <h1>VISUAL NODE</h1>
  <button id="start-btn">START</button>
  <div id="status">Waiting for audio permission...</div>
</div>

<div id="ui" class="hidden">
  <div id="info">fps: — | L1: — | L2: — | blend: 0.00</div>
  <select id="shader-select"></select>
  <div>Tab=UI &nbsp;|&nbsp; 1–8=L1 &nbsp;|&nbsp; q–i=L2 &nbsp;|&nbsp; ↑↓=blend &nbsp;|&nbsp; b/nm,.=blend &nbsp;|&nbsp; a/sdfg=auto &nbsp;|&nbsp; ⌫=pause · Space=resume · 0=reset</div>
</div>

<!-- Vertex shader (shared) -->
<script id="vs" type="x-shader/x-vertex">
attribute vec2 a_pos;
void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }
</script>

<!-- Blit shader -->
<script id="fs-blit" type="x-shader/x-fragment">
precision mediump float;
uniform sampler2D u_tex;
uniform vec2 u_res;
void main() {
  gl_FragColor = texture2D(u_tex, gl_FragCoord.xy / u_res);
}
</script>

<!-- Blend shader: combines Layer 1 + Layer 2 -->
<script id="fs-blend" type="x-shader/x-fragment">
precision mediump float;
uniform sampler2D u_layer1;
uniform sampler2D u_layer2;
uniform vec2      u_res;
uniform float     u_blend;
uniform int       u_mode;
void main() {
  vec2 uv = gl_FragCoord.xy / u_res;
  vec4 c1 = texture2D(u_layer1, uv);
  vec4 c2 = texture2D(u_layer2, uv);
  vec4 col;
  if (u_mode == 0) {
    col = mix(c1, c2, u_blend);
  } else if (u_mode == 1) {
    col = clamp(c1 + c2 * u_blend, 0.0, 1.0);
  } else if (u_mode == 2) {
    col = mix(c1, c1 * c2, u_blend);
  } else {
    float luma = dot(c2.rgb, vec3(0.299, 0.587, 0.114));
    col = mix(c1, clamp(c1 + c2, 0.0, 1.0), luma * u_blend);
  }
  gl_FragColor = col;
}
</script>

<!-- Scene registry (must be first) -->
<script>
  const SCENES  = [];
  const SCENES2 = [];
  function registerScene(s)  { SCENES.push(s); }
  function registerScene2(s) { SCENES2.push(s); }
</script>

<!-- GLSL helpers + scenes -->
<script src="glsl-helpers.js"></script>
<script src="scenes/interference-collapse.js"></script>
<script src="scenes/stochastic-jump.js"></script>
<script src="scenes/threshold-flip.js"></script>
<script src="scenes/chromatic-storm.js"></script>

<!-- Layer 1 scenes 5-8 -->
<script src="scenes/sine-tangle.js"></script>
<script src="scenes/plasma-bloom.js"></script>
<script src="scenes/crystal-lattice.js"></script>
<script src="scenes/orbital-rings.js"></script>

<!-- Layer 2 scenes -->
<script src="scenes2/color-tide.js"></script>
<script src="scenes2/smoke-drift.js"></script>
<script src="scenes2/neon-grid.js"></script>
<script src="scenes2/aurora-wave.js"></script>
<script src="scenes2/liquid-mirror.js"></script>
<script src="scenes2/vortex-field.js"></script>
<script src="scenes2/petal-bloom.js"></script>
<script src="scenes2/deep-field.js"></script>

<!-- Engine -->
<script src="engine.js"></script>

<!-- Live-reload (dev only) -->
<script>
if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
  const es = new EventSource('/__reload');
  es.onmessage = e => { if (e.data === 'reload') location.reload(); };
  es.onerror   = () => es.close();
}
</script>

</body>
</html>
