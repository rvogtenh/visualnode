<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Visual Node MVP</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; cursor: none; }
  canvas { display: block; width: 100vw; height: 100vh; }

  #ui {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 16px;
    background: rgba(0,0,0,0.55);
    color: #aaa; font-family: monospace; font-size: 12px;
    z-index: 10; transition: opacity 0.4s;
  }
  #ui.hidden { opacity: 0; pointer-events: none; }

  #start-screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #000; color: #fff;
    font-family: monospace; z-index: 20; gap: 20px;
  }
  #start-screen h1 { font-size: 1.4em; font-weight: normal; letter-spacing: 0.2em; color: #777; }
  #start-btn {
    padding: 12px 32px; border: 1px solid #555;
    background: transparent; color: #fff;
    font-family: monospace; font-size: 14px; letter-spacing: 0.1em;
    cursor: pointer; transition: border-color 0.2s;
  }
  #start-btn:hover { border-color: #fff; }
  #status { font-size: 11px; color: #555; }

  #shader-select {
    background: transparent; border: 1px solid #444;
    color: #aaa; font-family: monospace; font-size: 12px;
    padding: 2px 6px; cursor: pointer;
  }
  #shader-select option { background: #111; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="start-screen">
  <h1>VISUAL NODE</h1>
  <button id="start-btn">START</button>
  <div id="status">Waiting for audio permission...</div>
</div>

<div id="ui" class="hidden">
  <div id="info">fps: — | bass: — | mid: — | high: —</div>
  <select id="shader-select"></select>
  <div>H = toggle UI &nbsp;|&nbsp; 1–4 = scenes</div>
</div>

<!-- Vertex shader (shared) -->
<script id="vs" type="x-shader/x-vertex">
attribute vec2 a_pos;
void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }
</script>

<!-- Blit shader -->
<script id="fs-blit" type="x-shader/x-fragment">
precision mediump float;
uniform sampler2D u_tex;
uniform vec2 u_res;
void main() {
  gl_FragColor = texture2D(u_tex, gl_FragCoord.xy / u_res);
}
</script>

<!-- Scene registry (must be first) -->
<script>
  const SCENES = [];
  function registerScene(s) { SCENES.push(s); }
</script>

<!-- GLSL helpers + scenes -->
<script src="glsl-helpers.js"></script>
<script src="scenes/interference-collapse.js"></script>
<script src="scenes/stochastic-jump.js"></script>
<script src="scenes/threshold-flip.js"></script>
<script src="scenes/chromatic-storm.js"></script>

<!-- Engine -->
<script src="engine.js"></script>

<!-- Live-reload (dev only) -->
<script>
if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
  const es = new EventSource('/__reload');
  es.onmessage = e => { if (e.data === 'reload') location.reload(); };
  es.onerror   = () => es.close();
}
</script>

</body>
</html>
